<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shortfall Monitoring Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/charts/loader.js"></script>
<style>
  :root{
    --ink:#12212e;
    --paper:#f6f8f9;
    --line:#dde3e6;
    --card:#ffffff;
    --declared:#1f6f78;
    --undeclared:#c1622c;
    --muted:#5c6b73;
    --accent:#12212e;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Inter',system-ui,-apple-system,Segoe UI,sans-serif;
    background:var(--paper);
    color:var(--ink);
  }
  .lls-wrap{
    max-width:1180px;
    margin:0 auto;
    padding:28px 20px 48px;
  }
  .lls-header{
    display:flex;
    flex-wrap:wrap;
    align-items:flex-end;
    justify-content:space-between;
    gap:16px;
    border-bottom:2px solid var(--ink);
    padding-bottom:16px;
    margin-bottom:28px;
  }
  .lls-eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--muted);
    margin:0 0 6px;
  }
  .lls-title{
    font-size:26px;
    font-weight:700;
    margin:0;
    letter-spacing:-0.01em;
  }
  .lls-select-wrap{
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .lls-select-wrap label{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:.1em;
    text-transform:uppercase;
    color:var(--muted);
  }
  #monthSelect{
    font-family:'Inter',sans-serif;
    font-size:14px;
    font-weight:600;
    color:var(--ink);
    background:var(--card);
    border:1.5px solid var(--ink);
    border-radius:2px;
    padding:9px 34px 9px 12px;
    min-width:200px;
    appearance:none;
    -webkit-appearance:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0l5 6 5-6z' fill='%2312212e'/></svg>");
    background-repeat:no-repeat;
    background-position:right 12px center;
    cursor:pointer;
  }
  #monthSelect:focus-visible{
    outline:2px solid var(--declared);
    outline-offset:2px;
  }
  .lls-status{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    color:var(--muted);
    margin-bottom:16px;
    min-height:16px;
  }
  .lls-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:4px;
    padding:20px 22px 8px;
    margin-bottom:22px;
  }
  .lls-card-title{
    font-size:14px;
    font-weight:600;
    letter-spacing:.01em;
    margin:0 0 4px;
  }
  .lls-card-sub{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--muted);
    margin:0 0 14px;
  }
  .lls-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:22px;
  }
  @media (max-width:760px){
    .lls-row{grid-template-columns:1fr;}
    .lls-header{flex-direction:column;align-items:flex-start;}
  }
  .lls-chart{width:100%;height:380px;}
  .lls-chart.pie{height:340px;}
  .lls-legend{
    display:flex;
    gap:18px;
    justify-content:flex-end;
    margin-bottom:6px;
  }
  .lls-legend-item{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:12px;
    font-weight:600;
    color:var(--ink);
  }
  .lls-dot{
    width:10px;
    height:10px;
    border-radius:2px;
    display:inline-block;
  }
  .lls-svg-scroll{
    width:100%;
    height:calc(100% - 26px);
    overflow-x:auto;
    overflow-y:hidden;
  }
  .lls-svg-scroll svg{
    height:100%;
    min-width:100%;
  }
  .lls-bar3d{
    cursor:pointer;
  }
  .lls-tooltip{
    display:none;
    position:fixed;
    z-index:9999;
    background:#12212e;
    color:#f6f8f9;
    font-family:'Inter',sans-serif;
    font-size:12px;
    line-height:1.5;
    padding:8px 12px;
    border-radius:4px;
    box-shadow:0 4px 14px rgba(0,0,0,0.22);
    pointer-events:none;
    white-space:nowrap;
  }
  .lls-tooltip-dot{
    display:inline-block;
    width:8px;
    height:8px;
    border-radius:2px;
    margin-right:6px;
  }
  .lls-empty{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    color:var(--muted);
    padding:40px 0;
    text-align:center;
  }
  .lls-footer{
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    color:var(--muted);
    text-align:center;
    margin-top:8px;
  }
</style>
</head>
<body>
<div class="lls-wrap">

  <div class="lls-header">
    <div>
      <p class="lls-eyebrow">LLS · Shortfall Monitoring</p>
      <h1 class="lls-title">Hospital Shortage Overview</h1>
    </div>
    <div class="lls-select-wrap">
      <label for="monthSelect">Reporting period</label>
      <select id="monthSelect"><option value="ALL">All months</option></select>
    </div>
  </div>

  <p class="lls-status" id="statusLine">Loading data…</p>

  <div class="lls-card">
    <p class="lls-card-title">Shortage Declared and Undeclared for All Sites</p>
    <p class="lls-card-sub" id="colSub">&nbsp;</p>
    <div id="columnChart" class="lls-chart"></div>
  </div>

  <div class="lls-row">
    <div class="lls-card">
      <p class="lls-card-title">Pie Chart of Undeclared Shortage by Site</p>
      <p class="lls-card-sub" id="pieUndecSub">&nbsp;</p>
      <div id="pieUndeclared" class="lls-chart pie"></div>
    </div>
    <div class="lls-card">
      <p class="lls-card-title">Pie Chart of Declared Shortage by Site</p>
      <p class="lls-card-sub" id="pieDecSub">&nbsp;</p>
      <div id="pieDeclared" class="lls-chart pie"></div>
    </div>
  </div>

  <p class="lls-footer">Data source: “[V2] KPI Target” · auto-synced from monthly SummaryByHospital tabs</p>
</div>

<script>
/* =====================================================================
   CONFIG — paste your deployed Apps Script Web App URL below.
   (Deploy > New deployment > Web app, in the linked Apps Script project)
   ===================================================================== */
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw93TEnH8A4yuX_CPLOKKDYIbHKxgh-thnZ4JVN-TTRiSab1OEyVIfvzmYFAx5MFEFHkw/exec";

let RAW_DATA = null;

google.charts.load('current', { packages: ['corechart'] });
google.charts.setOnLoadCallback(init);

async function init() {
  const statusLine = document.getElementById('statusLine');
  try {
    const res = await fetch(WEB_APP_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    RAW_DATA = await res.json();
  } catch (err) {
    statusLine.textContent = 'Could not load data. Check WEB_APP_URL in dashboard.html — ' + err.message;
    showEmptyStates();
    return;
  }

  if (!RAW_DATA || !RAW_DATA.months || RAW_DATA.months.length === 0) {
    statusLine.textContent = 'No monthly data found yet.';
    showEmptyStates();
    return;
  }

  populateMonthDropdown(RAW_DATA.months);
  statusLine.textContent = 'Loaded ' + RAW_DATA.months.length + ' month(s) · ' + RAW_DATA.sites.length + ' site(s)';

  document.getElementById('monthSelect').addEventListener('change', renderAll);
  renderAll();
  window.addEventListener('resize', debounce(renderAll, 200));
}

function populateMonthDropdown(months) {
  const select = document.getElementById('monthSelect');
  months.forEach(m => {
    const opt = document.createElement('option');
    opt.value = m.month;
    opt.textContent = m.month;
    select.appendChild(opt);
  });
}

function getSelectedAggregate() {
  const selected = document.getElementById('monthSelect').value;
  const sites = RAW_DATA.sites;

  if (selected === 'ALL') {
    const declared = sites.map(() => 0);
    const undeclared = sites.map(() => 0);
    RAW_DATA.months.forEach(m => {
      m.declared.forEach((v, i) => declared[i] += (v || 0));
      m.undeclared.forEach((v, i) => undeclared[i] += (v || 0));
    });
    return { label: 'All months (sum)', declared, undeclared };
  }

  const m = RAW_DATA.months.find(x => x.month === selected);
  return { label: selected, declared: m.declared, undeclared: m.undeclared };
}

function renderAll() {
  const agg = getSelectedAggregate();
  document.getElementById('colSub').textContent = agg.label;
  document.getElementById('pieUndecSub').textContent = agg.label;
  document.getElementById('pieDecSub').textContent = agg.label;

  drawColumnChart(agg);
  drawPieChart('pieDeclared', RAW_DATA.sites, agg.declared, 'Declared');
  drawPieChart('pieUndeclared', RAW_DATA.sites, agg.undeclared, 'Undeclared');
}

function drawColumnChart(agg) {
  const container = document.getElementById('columnChart');
  const sites = RAW_DATA.sites;
  const declared = agg.declared;
  const undeclared = agg.undeclared;

  const hasData = declared.some(v => v > 0) || undeclared.some(v => v > 0);
  if (!hasData) {
    container.innerHTML = '<div class="lls-empty">No data for this period</div>';
    return;
  }

  // --- layout constants (local SVG coordinate space) ---
  const groupWidth = 46;
  const barWidth = 16;
  const barGap = 4;
  const depthX = 9;   // 3D extrusion skew (horizontal)
  const depthY = -9;  // 3D extrusion skew (vertical)
  const plotHeight = 260;
  const leftPad = 46;
  const rightPad = 24;
  const topPad = 26;
  const bottomPad = 92;

  const n = sites.length;
  const plotWidth = n * groupWidth;
  const svgWidth = leftPad + plotWidth + depthX + rightPad;
  const svgHeight = topPad + Math.abs(depthY) + plotHeight + bottomPad;

  const maxVal = Math.max(1, ...declared, ...undeclared) * 1.15;
  const scale = plotHeight / maxVal;
  const baseY = topPad + Math.abs(depthY) + plotHeight;

  const declaredFront = '#1f6f78', declaredTop = shadeHex(declaredFront, 26), declaredSide = shadeHex(declaredFront, -20);
  const undeclaredFront = '#c1622c', undeclaredTop = shadeHex(undeclaredFront, 26), undeclaredSide = shadeHex(undeclaredFront, -20);

  let svg = `<svg viewBox="0 0 ${svgWidth} ${svgHeight}" preserveAspectRatio="xMinYMid meet" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">`;
  svg += `<g font-family="Inter, sans-serif">`;

  // gridlines + y-axis labels (0, 25%, 50%, 75%, 100% of maxVal)
  for (let t = 0; t <= 4; t++) {
    const val = Math.round((maxVal * t) / 4);
    const y = baseY - (val * scale);
    svg += `<line x1="${leftPad}" y1="${y}" x2="${leftPad + plotWidth}" y2="${y}" stroke="#eef1f2" stroke-width="1"/>`;
    svg += `<text x="${leftPad - 8}" y="${y + 3}" font-size="9" fill="#5c6b73" text-anchor="end">${val.toLocaleString()}</text>`;
  }

  // bars
  sites.forEach((site, i) => {
    const gx = leftPad + i * groupWidth;
    const dX = gx;
    const uX = gx + barWidth + barGap;
    const dH = declared[i] * scale;
    const uH = undeclared[i] * scale;

    svg += bar3d_(dX, baseY, barWidth, dH, depthX, depthY, declaredFront, declaredTop, declaredSide, site, 'Declared', declared[i] || 0);
    svg += bar3d_(uX, baseY, barWidth, uH, depthX, depthY, undeclaredFront, undeclaredTop, undeclaredSide, site, 'Undeclared', undeclared[i] || 0);

    const labelX = gx + barWidth + barGap / 2;
    svg += `<text x="${labelX}" y="${baseY + 14}" font-size="9" fill="#5c6b73" text-anchor="end" transform="rotate(-45 ${labelX} ${baseY + 14})">${escapeXml_(site)}</text>`;
  });

  // axis line
  svg += `<line x1="${leftPad}" y1="${topPad}" x2="${leftPad}" y2="${baseY}" stroke="#dde3e6" stroke-width="1"/>`;

  svg += `</g></svg>`;

  container.innerHTML =
    '<div class="lls-legend">' +
      '<span class="lls-legend-item"><span class="lls-dot" style="background:' + declaredFront + '"></span>Declared</span>' +
      '<span class="lls-legend-item"><span class="lls-dot" style="background:' + undeclaredFront + '"></span>Undeclared</span>' +
    '</div>' +
    '<div class="lls-svg-scroll">' + svg + '</div>';

  attachBarTooltips_(container);
}

// Draws one extruded 3D bar (front + top + side faces) as SVG markup,
// tagged with data attributes so attachBarTooltips_ can show a custom
// popup on hover (matching the pie chart's tooltip style).
function bar3d_(x, baseY, width, height, depthX, depthY, frontColor, topColor, sideColor, site, series, value) {
  if (!height || height <= 0) return '';
  const topY = baseY - height;
  const attrs = `class="lls-bar3d" data-site="${escapeXml_(site)}" data-series="${escapeXml_(series)}" data-value="${value}" data-color="${frontColor}"`;

  const front = `<rect ${attrs} x="${x}" y="${topY}" width="${width}" height="${height}" fill="${frontColor}"/>`;

  const topPts = [
    [x, topY], [x + width, topY],
    [x + width + depthX, topY + depthY], [x + depthX, topY + depthY]
  ].map(p => p.join(',')).join(' ');
  const top = `<polygon ${attrs} points="${topPts}" fill="${topColor}"/>`;

  const sidePts = [
    [x + width, topY], [x + width, baseY],
    [x + width + depthX, baseY + depthY], [x + width + depthX, topY + depthY]
  ].map(p => p.join(',')).join(' ');
  const side = `<polygon ${attrs} points="${sidePts}" fill="${sideColor}"/>`;

  return front + top + side;
}

// Attaches a floating, styled tooltip (site / series / value) to every
// bar face in the given container, shown on hover and following the cursor.
function attachBarTooltips_(container) {
  let tooltip = document.getElementById('llsBarTooltip');
  if (!tooltip) {
    tooltip = document.createElement('div');
    tooltip.id = 'llsBarTooltip';
    tooltip.className = 'lls-tooltip';
    document.body.appendChild(tooltip);
  }

  const shapes = container.querySelectorAll('.lls-bar3d');
  shapes.forEach(el => {
    el.addEventListener('mouseenter', () => {
      const site = el.getAttribute('data-site');
      const series = el.getAttribute('data-series');
      const value = Number(el.getAttribute('data-value')).toLocaleString();
      const color = el.getAttribute('data-color');
      tooltip.innerHTML =
        '<span class="lls-tooltip-dot" style="background:' + color + '"></span>' +
        '<strong>' + site + '</strong><br>' + series + ': ' + value;
      tooltip.style.display = 'block';
    });
    el.addEventListener('mousemove', (e) => {
      tooltip.style.left = (e.clientX + 14) + 'px';
      tooltip.style.top = (e.clientY + 14) + 'px';
    });
    el.addEventListener('mouseleave', () => {
      tooltip.style.display = 'none';
    });
  });
}

function shadeHex(hex, percent) {
  let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
  const amt = Math.round(2.55 * percent);
  r = Math.min(255, Math.max(0, r + amt));
  g = Math.min(255, Math.max(0, g + amt));
  b = Math.min(255, Math.max(0, b + amt));
  return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
}

function escapeXml_(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function drawPieChart(elId, sites, values, seriesLabel) {
  const dataTable = new google.visualization.DataTable();
  dataTable.addColumn('string', 'Site');
  dataTable.addColumn('number', seriesLabel);

  let hasData = false;
  sites.forEach((site, i) => {
    const v = values[i] || 0;
    if (v > 0) hasData = true;
    dataTable.addRow([site, v]);
  });

  const container = document.getElementById(elId);
  if (!hasData) {
    container.innerHTML = '<div class="lls-empty">No ' + seriesLabel.toLowerCase() + ' shortage values for this period</div>';
    return;
  }
  container.innerHTML = '';

  const options = {
    title: '',
    fontName: 'Inter',
    is3D: true,
    colors: buildDistinctPalette(sites.length),
    legend: { position: 'right', textStyle: { fontSize: 11, color: '#12212e' } },
    chartArea: { left: 10, top: 10, right: 10, bottom: 10, width: '92%', height: '92%' },
    backgroundColor: 'transparent',
    pieSliceTextStyle: { fontSize: 10 }
  };

  const chart = new google.visualization.PieChart(container);
  chart.draw(dataTable, options);
}

// A curated set of visually distinct hues (blue, green, red, purple,
// orange, teal, etc.) — used for BOTH pie charts so each site keeps
// the same color across the Declared and Undeclared pies, and slices
// are easy to tell apart at a glance instead of shades of one color.
const DISTINCT_PALETTE = [
  '#2f6fed', // blue
  '#2fae66', // green
  '#e0483f', // red
  '#8a4fd0', // purple
  '#e0932f', // orange
  '#1fa4a0', // teal
  '#d1479a', // magenta/pink
  '#9aa628', // olive
  '#4f6fd0', // indigo
  '#c96b2e', // burnt orange
  '#2f9fd0', // sky blue
  '#7a4a2e', // brown
  '#5fb84a', // lime green
  '#a83f6b', // wine
  '#4a90a4', // steel blue
  '#d6603d', // terracotta
  '#6a5fd0', // violet
  '#3fae9a', // seafoam
  '#c2472f', // brick red
  '#8a8f2e'  // mustard
];

function buildDistinctPalette(count) {
  const colors = [];
  for (let i = 0; i < count; i++) {
    colors.push(DISTINCT_PALETTE[i % DISTINCT_PALETTE.length]);
  }
  return colors;
}

function showEmptyStates() {
  ['columnChart','pieDeclared','pieUndeclared'].forEach(id => {
    document.getElementById(id).innerHTML = '<div class="lls-empty">No data available</div>';
  });
}

function debounce(fn, wait) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), wait); };
}
</script>
</body>
</html>
